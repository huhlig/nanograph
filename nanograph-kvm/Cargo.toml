# Async Await
futures.workspace = true

# Logging and Metrics
metrics.workspace = true
tracing.workspace = true
tracing-timing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tokio-test.workspace = true
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "manager_bench"
